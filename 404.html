<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wakfu Simulateur</title>
  <script>
    // Redirige les routes Angular vers index.html sur GitHub Pages
    // Source: https://github.com/rafgraph/spa-github-pages
    var segmentCount = 1; // = nombre de segments du repo (1 pour /wakfu-simulateur/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
